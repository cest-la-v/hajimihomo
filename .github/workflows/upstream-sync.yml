name: Upstream sync check

on:
  workflow_call:
  schedule:
    - cron: '0 3 * * 1'  # weekly on Monday 03:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install pyyaml

      - name: Sparse-clone blackmatrix7 source rules
        run: |
          git clone --filter=blob:none --no-checkout --depth=1 \
            https://github.com/blackmatrix7/ios_rule_script.git /tmp/bm7
          cd /tmp/bm7
          git sparse-checkout init --no-cone
          printf 'source/rule/*/\n' > .git/info/sparse-checkout
          git checkout

      - name: Re-extract sources.yaml
        run: |
          python3 scripts/extract_sources.py \
            --vendor-dir /tmp/bm7 \
            --output-dir source/rule

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet source/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat source/
          fi

      - name: Open PR if sources changed
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="upstream-sync/$(date -u +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add source/
          git commit -m "chore: sync upstream sources from blackmatrix7

Auto-extracted from blackmatrix7/ios_rule_script via scripts/extract_sources.py"
          git push origin "$BRANCH"
          gh pr create \
            --base dev \
            --head "$BRANCH" \
            --title "chore: sync upstream sources $(date -u +%Y-%m-%d)" \
            --body "Auto-generated by upstream-sync workflow. Review before merging."
