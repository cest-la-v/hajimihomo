name: Build rule-sets

on:
  workflow_call:  # called from main branch trigger.yml
  schedule:
    - cron: '0 19 * * *'  # daily 19:00 UTC = 03:00 UTC+8
  push:
    branches: [dev]
    paths:
      - 'source/**'
      - 'scripts/**'

concurrency:
  group: build
  cancel-in-progress: false  # never cancel a running build; queue instead

permissions:
  contents: write
  actions: write  # needed for delete-workflow-runs

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0  # need full history for worktree branch operations

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate source rules
        run: python3 scripts/validate.py

      - name: Build rule-sets
        run: python3 scripts/build.py --jobs 16 --with-groups

      - name: Push text rule-sets to branches
        run: bash scripts/publish/push_text.sh

      - name: Purge jsDelivr CDN cache
        run: python3 scripts/publish/purge_cdn.py

      - name: Compile sing-box binaries (.srs)
        run: |
          SING_BOX_VERSION=$(curl -sSL https://api.github.com/repos/SagerNet/sing-box/releases/latest \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['tag_name'])")
          echo "sing-box $SING_BOX_VERSION"
          curl -sSL "https://github.com/SagerNet/sing-box/releases/download/${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION#v}-linux-amd64.tar.gz" \
            | tar xzf - --wildcards '*/sing-box' --strip-components=1
          mkdir -p dist/binaries/singbox
          for f in dist/singbox/*.json; do
            name=$(basename "$f" .json)
            ./sing-box rule-set compile --output "dist/binaries/singbox/${name}.srs" "$f"
          done
          echo "Compiled $(ls dist/binaries/singbox/*.srs 2>/dev/null | wc -l) .srs files"

      - name: Compile mihomo binaries (.mrs)
        run: |
          MIHOMO_VERSION=$(curl -sSL https://api.github.com/repos/MetaCubeX/mihomo/releases/latest \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['tag_name'])")
          echo "mihomo $MIHOMO_VERSION"
          curl -sSL "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-${MIHOMO_VERSION}.gz" \
            | gunzip > ./mihomo && chmod +x ./mihomo
          mkdir -p dist/binaries/mihomo
          for f in dist/mihomo/*.yaml; do
            name=$(basename "$f" .yaml)
            behavior=$(grep -m1 "^# behavior:" "$f" | awk '{print $3}' || echo "classical")
            ./mihomo convert-ruleset "$behavior" yaml "$f" "dist/binaries/mihomo/${name}.mrs" 2>/dev/null || true
          done
          echo "Compiled $(ls dist/binaries/mihomo/*.mrs 2>/dev/null | wc -l) .mrs files"

      - name: Validate binaries
        run: |
          if [ -d dist/binaries ]; then
            python3 scripts/validate_binaries.py dist/binaries/
          else
            echo "No binaries directory — skipping binary validation"
          fi

      - name: Publish binaries to GitHub Releases
        if: ${{ hashFiles('dist/binaries/*') != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/publish/push_binaries.sh

      - name: Build stats + diff
        run: python3 scripts/stats.py

      - name: Upload build-meta.json
        uses: actions/upload-artifact@v4
        with:
          name: build-meta
          path: dist/build-meta.json

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 3
          keep_minimum_runs: 1
