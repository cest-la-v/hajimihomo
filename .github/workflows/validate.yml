name: Validate source rules

on:
  workflow_call:
  pull_request:
    branches: [dev]
    paths:
      - 'source/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate source rules
        run: python3 scripts/validate.py
