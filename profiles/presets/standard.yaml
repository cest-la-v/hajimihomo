# standard preset — everyday: full services with regional url-test
name: standard
description: "Everyday: all key services + streaming + social. Regional auto-test groups."
target: mihomo
topology: standard
features:
  ads_block: true
  tracking_block: true
  quic_block: true
  load_balance: false

groups:
  - block/ads
  - block/tracking
  - direct/cn
  - proxy/apple
  - proxy/google
  - proxy/microsoft
  - proxy/youtube
  - proxy/telegram
  - proxy/twitter
  - proxy/netflix
  - proxy/streaming
  - proxy/social
  - proxy/ai
