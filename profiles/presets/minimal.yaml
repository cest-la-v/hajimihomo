# minimal preset — essential categories only
# Used by profile builder when user wants a lean config

name: minimal
description: "Core rules only: ads, China direct, proxy basics"

categories:
  - Advertising       # block ads
  - Privacy           # block tracking/telemetry
  - China             # Chinese sites → direct
  - Apple             # Apple services
  - Google            # Google services → proxy
  - Telegram          # Telegram → proxy
  - YouTube           # YouTube → proxy
  - GitHub            # GitHub → proxy
  - Microsoft         # Microsoft → direct

behavior_overrides: {}  # use auto-detected behavior per category
