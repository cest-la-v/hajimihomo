# simple preset — lite: essential services with single global url-test
name: simple
description: "Essential services: Apple, Google, Microsoft, YouTube, Telegram, AI. Single global auto-test."
target: mihomo
topology: minimal
features:
  ads_block: true
  tracking_block: false
  quic_block: false
  load_balance: false

groups:
