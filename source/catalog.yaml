# hajimihomo Rule Catalog
# 
# Defines semantic groups — named bundles of blackmatrix7 leaf categories.
# Each group is designed to map directly to a policy group in mihomo/sing-box.
#
# Group composition fields:
#   members:      list of bm7 category names to union into this group
#   members_ref:  list of other catalog group IDs to union (for meta groups)
#   excludes:     list of bm7 category names to subtract from the result
#   excludes_ref: list of other catalog group IDs to subtract from the result
#
# members/excludes operate at the bm7 layer — RuleResolver applies their
# includes/excludes from relationships.yaml before the set operation.
# members_ref/excludes_ref operate at the catalog layer — the referenced
# group is fully resolved first, then unioned or subtracted.
#
# Tiers:
#   block/*   — traffic to reject
#   direct/*  — traffic that bypasses proxy (domestic/private)
#   proxy/*   — traffic that goes through proxy
#   meta/*    — composite bundles (union of other catalog groups)
#
# default_action: hint for the profile builder (REJECT / DIRECT / PROXY)
# region:         typical exit node region (any / us / jp / sg / cn)
# tags:           for profile builder filtering / UI grouping

version: 1

groups:

  # =========================================================================
  # BLOCK — reject traffic
  # =========================================================================

  block/ads:
    name: "Ads & Tracking"
    description: >
      Comprehensive ad-block: ad networks, tracking pixels, analytics scripts,
      hijacking domains, and privacy trackers. Uses blackmatrix7's Advertising
      category which already absorbs AdvertisingLite, Hijacking, and Privacy
      and strips Direct-access domains.
    default_action: REJECT
    region: any
    tags: [block, security, ads]
    members:
      - Advertising        # absorbs: AdvertisingLite, Hijacking, Privacy; strips: Direct

  block/ads-lite:
    name: "Ads Lite"
    description: >
      Conservative ad-block only — no hijacking or privacy rules.
      Suitable for users who find the full ads list too aggressive.
    default_action: REJECT
    region: any
    tags: [block, security, ads]
    members:
      - AdvertisingLite    # strips: Hijacking, Privacy

  block/tracking:
    name: "Privacy & Telemetry"
    description: >
      Telemetry endpoints, analytics trackers, EasyPrivacy domains,
      MIUI/vendor telemetry, and DNS-over-HTTP circumvention.
      Use alongside ads/ads-lite for comprehensive blocking.
    default_action: REJECT
    region: any
    tags: [block, security, privacy]
    members:
      - Privacy
      - EasyPrivacy
      - MIUIPrivacy
      - BlockHttpDNS

  # =========================================================================
  # DIRECT — bypass proxy (for China-based users)
  # =========================================================================

  direct/cn:
    name: "China Domestic"
    description: >
      All Chinese domestic domains: major platforms (Baidu, Alibaba, WeChat,
      Weibo, Tencent, iQiYI, Youku, NetEase, BiliBili), e-commerce (JD,
      Pinduoduo, Meituan), banking (BOC, ICBC, CCB), telecoms, government,
      and 200+ more services. Uses ChinaMaxNoIP which absorbs the full
      catalogue of Chinese service categories (without IP ranges).
      Route DIRECT for China-based users; overseas Chinese may prefer a
      CN-exit proxy node instead.
    default_action: DIRECT
    region: cn
    tags: [direct, cn, domestic]
    members:
      - ChinaMaxNoIP       # absorbs 240+ CN service categories; excludes IP ranges

  direct/cn-ips:
    name: "China IP Ranges"
    description: >
      Chinese IP address space (APNIC + BGP aggregated). Apply with
      no-resolve since these match by IP after DNS resolves.
    default_action: DIRECT
    region: cn
    tags: [direct, cn, ip]
    members:
      - ChinaIPs
      - ChinaIPsBGP

  direct/cn-no-media:
    name: "China Domestic (no media)"
    description: >
      All Chinese domestic domains excluding BiliBili and CCTV (ChinaMedia).
      Useful for users who want to route Chinese media through proxy for
      better CDN performance while keeping other CN services direct.
      Demonstrates excludes_ref: same as direct/cn minus direct/cn-media.
    default_action: DIRECT
    region: cn
    tags: [direct, cn, domestic]
    members_ref:
      - direct/cn
    excludes:
      - ChinaMedia         # subtract BiliBili + CCTV from the full CN set

  # =========================================================================
  # PROXY — services that need a proxy for China-based users
  # =========================================================================

  # --- Big Tech ---

  proxy/google:
    name: "Google"
    description: >
      Google Search, Maps, Gmail, Drive, Meet, Translate, Play Store,
      Firebase, FCM push notifications. Does NOT include YouTube
      (use proxy/youtube for that).
    default_action: PROXY
    region: any
    tags: [proxy, google]
    members:
      - Google             # bm7 Google already excludes YouTube/YouTubeMusic

  proxy/youtube:
    name: "YouTube"
    description: >
      YouTube video and YouTube Music. Kept separate from Google so it can
      be routed to a specific region for geo-restricted content.
    default_action: PROXY
    region: any
    tags: [proxy, streaming, google]
    members:
      - YouTube
      - YouTubeMusic

  proxy/apple:
    name: "Apple"
    description: >
      App Store, iCloud, TestFlight, Apple TV+, Apple Music, Apple News,
      Find My, Fitness+, Siri, iCloud Private Relay, and hardware/firmware
      update servers. Absorbs 15 Apple sub-categories.
    default_action: PROXY
    region: any
    tags: [proxy, apple]
    members:
      - Apple              # absorbs: AppStore, AppleFirmware, AppleHardware, AppleMail,
                           #   AppleMedia, AppleMusic, AppleNews, AppleProxy, AppleTV,
                           #   FindMy, FitnessPlus, Siri, TestFlight, iCloud, iCloudPrivateRelay

  proxy/microsoft:
    name: "Microsoft"
    description: >
      Microsoft 365, OneDrive, Teams, Bing, Edge, Azure CDN endpoints.
      Does NOT include GitHub (use proxy/dev for that).
    default_action: PROXY
    region: any
    tags: [proxy, microsoft]
    members:
      - Microsoft          # bm7 Microsoft excludes GitHub

  proxy/amazon:
    name: "Amazon"
    description: >
      Amazon shopping, AWS endpoints, Amazon Trust certificate services.
      Does NOT include Prime Video (in proxy/streaming).
    default_action: PROXY
    region: any
    tags: [proxy, amazon]
    members:
      - Amazon
      - AmazonTrust

  # --- Messaging ---

  proxy/telegram:
    name: "Telegram"
    description: >
      Telegram messenger — all datacenter regions (NL, SG, US).
    default_action: PROXY
    region: any
    tags: [proxy, messaging]
    members:
      - Telegram           # absorbs: TelegramNL, TelegramSG, TelegramUS

  proxy/twitter:
    name: "Twitter / X"
    description: >
      Twitter/X social network. Kept separate from the broader social group
      because many users route it to a specific region.
    default_action: PROXY
    region: any
    tags: [proxy, social]
    members:
      - Twitter

  # --- Streaming ---

  proxy/netflix:
    name: "Netflix"
    description: >
      Netflix streaming. Geo-locked — typically requires a proxy node in the
      target country. Kept separate from the streaming bundle for this reason.
    default_action: PROXY
    region: us           # common choice; adjust to your actual Netflix subscription region
    tags: [proxy, streaming, geo-locked]
    members:
      - Netflix

  proxy/streaming:
    name: "Global Streaming"
    description: >
      Disney+, HBO (all regional variants), Hulu (US + JP), Amazon Prime Video,
      Twitch, Spotify, Abema, Niconico, TVB, EncoreTVB, DAZN, Fubo, Sling,
      ITV, All4, TVer (Japan), KKTV, Bahamut (Taiwan), WeTV, NaverTV, ViuTV,
      LiTV, LineTV, VidolTV, AsianMedia bundle. Does not include Netflix
      (use proxy/netflix) or YouTube (use proxy/youtube).
    default_action: PROXY
    region: any
    tags: [proxy, streaming]
    members:
      - Disney
      - HBO
      - HBOHK
      - HBOUSA
      - Hulu
      - HuluJP
      - HuluUSA
      - AmazonPrimeVideo
      - Twitch
      - Spotify
      - Abema
      - AbemaTV
      - Niconico
      - TVB
      - EncoreTVB
      - DAZN
      - FuboTV
      - Sling
      - ITV
      - All4
      - TVer
      - KKTV
      - Bahamut
      - WeTV
      - NaverTV
      - ViuTV
      - LiTV
      - LineTV
      - VidolTV
      - AsianMedia

  # --- Social ---

  proxy/social:
    name: "Social Media"
    description: >
      Facebook, Instagram, Reddit, Discord, LinkedIn, TikTok (international),
      ByteDance (international services), Line, Tumblr, Pinterest.
      Twitter has its own group (proxy/twitter); Telegram has its own group.
    default_action: PROXY
    region: any
    tags: [proxy, social]
    members:
      - Facebook
      - Instagram
      - Reddit
      - Discord
      - LinkedIn
      - TikTok
      - ByteDance          # international ByteDance endpoints (distinct from DouYin domestic)
      - Line
      - Tumblr
      - Pinterest

  # --- AI / LLM ---

  proxy/ai:
    name: "AI Services"
    description: >
      OpenAI (ChatGPT, API, DALL-E) and Anthropic (Claude). Typically needs
      a US-region proxy for access from China and some other regions.
      Note: Gemini/BardAI exist as bm7 categories but have no upstream sources
      yet — add them here once bm7 populates them.
    default_action: PROXY
    region: us
    tags: [proxy, ai]
    members:
      - OpenAI
      - Anthropic
      # Gemini / BardAI: no upstream sources yet in bm7 — add when available

  # --- Gaming ---

  proxy/gaming:
    name: "Gaming Platforms"
    description: >
      Steam (global), PlayStation Network, Nintendo, Xbox, Epic Games, Blizzard
      (including Battle.net, WoW, Hearthstone, Overwatch, Diablo, StarCraft),
      EA, Riot, Ubisoft, Rockstar, and more. Absorbs 25+ gaming sub-categories.
    default_action: PROXY
    region: any
    tags: [proxy, gaming]
    members:
      - Game               # absorbs: Battle, Blizzard, Classic, DiabloIII, EA, Epic, Garena,
                           #   Gog, Hearthstone, HeroesoftheStorm, Nintendo, Overwatch,
                           #   PlayStation, Purikonejp, Riot, Rockstar, StarCraftII, Steam,
                           #   SteamCN, Supercell, UBI, WildRift, WorldofWarcraft, Xbox

  # --- Developer Tools ---

  proxy/dev:
    name: "Developer Tools"
    description: >
      GitHub, GitLab, Docker Hub, npm registry, Cloudflare (workers, pages, DNS),
      Vercel, DigitalOcean, Heroku, JFrog Artifactory, Akamai CDN, Adobe Creative
      Cloud, Atlassian (Jira, Confluence, Bitbucket), Figma, HashiCorp, Notion,
      Slack, and generic developer service endpoints.
    default_action: PROXY
    region: any
    tags: [proxy, dev]
    members:
      - GitHub
      - GitLab
      - Docker
      - Cloudflare
      - Vercel
      - DigitalOcean
      - Heroku
      - Npmjs
      - Jfrog
      - Developer
      - Akamai
      - Adobe
      - Atlassian
      - Figma
      - HashiCorp
      - Notion
      - Slack

  # --- Finance & Crypto ---

  proxy/finance:
    name: "Finance & Crypto"
    description: >
      PayPal, Binance, OKX. For users in regions where these services
      are restricted or rate-limited without a proxy.
    default_action: PROXY
    region: any
    tags: [proxy, finance]
    members:
      - PayPal
      - Binance
      - OKX

  # --- News ---

  proxy/news:
    name: "International News"
    description: >
      BBC, Bloomberg, CNN, Al Jazeera, NYTimes, VOA, Nikkei, Asahi Shimbun,
      AFP, Reuters, 9News (Australia). International news outlets commonly
      blocked or restricted in China.
    default_action: PROXY
    region: any
    tags: [proxy, news, media]
    members:
      - BBC
      - Bloomberg
      - CNN
      - ALJazeera
      - NYTimes
      - VOA
      - Nikkei
      - Asahi
      - AFP
      - ThomsonReuters
      - 9News

  # =========================================================================
  # META — composite bundles for simple configs
  # =========================================================================

  meta/block:
    name: "Block All"
    description: >
      Comprehensive block list: ads, tracking, and telemetry combined.
      For most users this single group replaces picking block/ads + block/tracking.
    default_action: REJECT
    region: any
    tags: [meta, block]
    members_ref:           # references other catalog groups (not bm7 categories)
      - block/ads
      - block/tracking

  meta/cn:
    name: "China All"
    description: >
      All China domestic rules: domain list + IP ranges combined.
    default_action: DIRECT
    region: cn
    tags: [meta, direct, cn]
    members_ref:
      - direct/cn
      - direct/cn-ips

  meta/foreign:
    name: "Foreign Services"
    description: >
      All services typically needing a proxy for China-based users.
      Includes Google, YouTube, Apple, Microsoft, Amazon, Telegram, Twitter,
      Netflix, streaming, social, AI, gaming, dev, finance, and news.
      Use as the catch-all PROXY group in simple configs.
    default_action: PROXY
    region: any
    tags: [meta, proxy, foreign]
    members_ref:
      - proxy/google
      - proxy/youtube
      - proxy/apple
      - proxy/microsoft
      - proxy/amazon
      - proxy/telegram
      - proxy/twitter
      - proxy/netflix
      - proxy/streaming
      - proxy/social
      - proxy/ai
      - proxy/gaming
      - proxy/dev
      - proxy/finance
      - proxy/news
